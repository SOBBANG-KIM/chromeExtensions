<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jira Worklog Quick Add</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Jira Worklog Quick Add <span id="appVersion" class="app-version"></span></h1>
        <p id="authStatus" class="auth-status"></p>
      </header>

      <nav class="tabs" role="tablist">
        <button
          id="tab-issue"
          class="tab active"
          type="button"
          role="tab"
          aria-selected="true"
          aria-controls="panel-issue"
        >
          add jira
        </button>
        <button
          id="tab-worklog"
          class="tab"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="panel-worklog"
        >
          add worklog
        </button>
        <button
          id="tab-my-issues"
          class="tab"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="panel-my-issues"
        >
          add my issues
        </button>
        <button
          id="tab-month-check"
          class="tab"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="panel-month-check"
        >
          월 현황 worklog
        </button>
      </nav>

      <section
        id="panel-issue"
        class="tab-panel"
        role="tabpanel"
        aria-labelledby="tab-issue"
      >
        <section class="card">
          <h2>이슈 내용</h2>
          <div class="row">
            <label class="grow">
              프로젝트 키
              <input
                id="projectKey"
                type="text"
                placeholder="FTPM"
                list="projectKeyList"
                autocomplete="off"
              />
              <datalist id="projectKeyList"></datalist>
            </label>
            <label class="grow">
              이슈 타입 (이름)
              <select id="issueType">
                <option value="큰틀">큰틀</option>
                <option value="작업">작업</option>
                <option value="버그">버그</option>
                <option value="부작업">부작업</option>
              </select>
            </label>
          </div>
          <label id="componentRow" class="hidden">
            구성요소
            <select id="component">
              <option value="">구성요소 선택</option>
            </select>
          </label>
          <label id="parentIssueRow">
            상위 이슈 키
            <input id="parentIssueKey" type="text" placeholder="FTPM-1234" />
          </label>
          <div id="issueExtraFields" class="issue-extra-fields" aria-live="polite"></div>
          <label>
            요약
            <input id="summary" type="text" placeholder="요약을 입력하세요" />
          </label>
          <label>
            설명
            <textarea
              id="description"
              rows="6"
              placeholder="상세 내용을 입력하세요"
            ></textarea>
          </label>
          <div class="divider"></div>
          <h3>Worklog (선택)</h3>
          <div class="row">
            <label class="grow" style="max-width: 230px;">
              시작 시각
              <input id="issueWorklogStarted" type="datetime-local" />
            </label>
            <label class="grow wide">
              작업 시간
              <input id="issueWorklogTimeSpent" type="text" placeholder="1h 30m" />
            </label>
          </div>
        </section>

        <section class="actions">
          <button id="create" class="primary" type="button">등록</button>
          <button id="clear" class="secondary" type="button">입력 초기화</button>
        </section>
      </section>

      <section
        id="panel-worklog"
        class="tab-panel hidden"
        role="tabpanel"
        aria-labelledby="tab-worklog"
      >
        <section class="card">
          <h2>Worklog 입력</h2>
          <div class="row" style="gap: 8px;justify-content: center;align-items: center;">
            <label class="grow">
              이슈 키
              <input id="worklogIssueKey" type="text" placeholder="FTPM-1234" />
            </label>
            <button id="useLastIssue" class="secondary" type="button" style="margin-top: 8px;">
              마지막 이슈 키 사용
            </button>
          </div>
          <div class="divider"></div>
          <h3>구글 캘린더</h3>
          <div class="row">
            <label class="grow">
              날짜
              <input id="calendarDate" type="date" />
            </label>
            <label class="grow">
              시간 범위
              <input
                id="calendarRange"
                type="text"
                placeholder="09:30 ~ 18:30"
              />
            </label>
          </div>
          <div class="row" style="align-items: center; flex-wrap: wrap; gap: 8px;">
            <button id="googleLogin" class="secondary" type="button">
              Google 로그인
            </button>
            <button id="loadMeetings" class="secondary" type="button">
              회의 불러오기
            </button>
            <span id="loadedMeetingsCount" class="calendar-status" aria-live="polite"></span>
          </div>
          <p id="calendarStatus" class="calendar-status"></p>
          <nav class="worklog-mode-tabs" role="tablist" aria-label="저장 방식">
            <button id="tab-worklog-per-meeting" class="worklog-mode-tab active" type="button" role="tab" aria-selected="true" aria-controls="panel-worklog-per-meeting">
              회의별로 저장
            </button>
            <button id="tab-worklog-once" class="worklog-mode-tab" type="button" role="tab" aria-selected="false" aria-controls="panel-worklog-once">
              한번에 저장
            </button>
          </nav>
          <div id="panel-worklog-per-meeting" class="worklog-mode-panel" role="tabpanel" aria-labelledby="tab-worklog-per-meeting">
            <div id="loadedMeetingsList" class="loaded-meetings-list hidden" aria-live="polite"></div>
          </div>
          <div id="panel-worklog-once" class="worklog-mode-panel hidden" role="tabpanel" aria-labelledby="tab-worklog-once">
            <div class="divider"></div>
            <div class="row">
              <label class="grow" style="max-width: 230px;">
                시작 시각 (ex: 1w/3d/4h/30m/1h 30m))
                <input id="worklogStarted" type="datetime-local" />
              </label>
              <label class="grow wide">
                작업 시간
                <input id="worklogTimeSpent" type="text" placeholder="16h" />
              </label>
            </div>
            <label>
              설명
              <textarea id="worklogComment" rows="4" placeholder="간단한 작업 내용을 입력하세요"></textarea>
            </label>
          </div>
        </section>

        <section class="actions">
          <button id="addWorklog" class="primary" type="button">
            저장
          </button>
          <button id="clearWorklog" class="secondary" type="button">
            입력 초기화
          </button>
        </section>
      </section>

      <section
        id="panel-my-issues"
        class="tab-panel hidden"
        role="tabpanel"
        aria-labelledby="tab-my-issues"
      >
        <section class="card">
          <nav class="worklog-mode-tabs my-issues-mode-tabs" role="tablist" aria-label="내 이슈 보기">
            <button id="tab-my-issues-list" class="worklog-mode-tab active" type="button" role="tab" aria-selected="true" aria-controls="panel-my-issues-list">
              내 이슈 목록
            </button>
            <button id="tab-my-issues-missing" class="worklog-mode-tab" type="button" role="tab" aria-selected="false" aria-controls="panel-my-issues-missing">
              미기록 티켓
            </button>
            <button id="tab-my-issues-long-running" class="worklog-mode-tab" type="button" role="tab" aria-selected="false" aria-controls="panel-my-issues-long-running">
              장기 진행
            </button>
          </nav>

          <div id="panel-my-issues-list" class="worklog-mode-panel" role="tabpanel" aria-labelledby="tab-my-issues-list">
            <button type="button" class="tab-help">
              ⓘ 조회 조건
              <span class="tab-help-popover">담당자가 나인 이슈를 상태·프로젝트로 필터링해서 보여줍니다.
· 상태를 비우면 모든 상태를 조회합니다.
· 각 티켓 옆에는 이번 달 내가 남긴 worklog 시간(로그 Xh) 또는 미기록 여부가 함께 표시됩니다.</span>
            </button>
            <div class="my-issues-header">
              <span id="myIssuesStatus" class="calendar-status"></span>
            </div>
            <div class="row issue-filter-row">
              <div style="width: 60px; margin-bottom: 8px;">상태: </div>
              <input id="myIssuesStatusFilter" type="text" placeholder="전체 (비우면 모든 상태)" value="진행 중" list="myIssuesStatusList" autocomplete="off" style="margin-top: 0;"/>
              <datalist id="myIssuesStatusList">
                <option value="BACKLOG"></option>
                <option value="할 일"></option>
                <option value="진행 중"></option>
                <option value="개발 완료"></option>
                <option value="IN REVIEW"></option>
                <option value="완료"></option>
              </datalist>
              <div class="actions issue-filter-actions">
                <button id="loadMyInProgressIssues" class="primary" type="button">
                  조회
                </button>
                <button id="resetMyIssuesStatusFilter" class="secondary" type="button">
                  초기화
                </button>
              </div>
            </div>
            <div id="myIssuesPaging" class="issue-paging hidden">
              <span id="myIssuesPageInfo" class="issue-page-info"></span>
              <div class="issue-paging-buttons">
                <button id="myIssuesPrev" class="secondary" type="button">이전</button>
                <button id="myIssuesNext" class="secondary" type="button">다음</button>
              </div>
            </div>
            <div id="myIssuesProjectFilterRow" class="row issue-filter-row hidden">
              <div style="width: 60px; margin-bottom: 8px;">프로젝트: </div>
              <select id="myIssuesProjectFilter" style="margin-top: 0;">
                <option value="">전체</option>
              </select>
            </div>
            <ul id="myIssuesList" class="issue-list" aria-live="polite"></ul>
          </div>

          <div id="panel-my-issues-missing" class="worklog-mode-panel hidden" role="tabpanel" aria-labelledby="tab-my-issues-missing">
            <button type="button" class="tab-help">
              ⓘ 조회 조건
              <span class="tab-help-popover">선택한 달 동안 상태가 바뀌었거나 새로 생성된 내 담당 이슈 중, 그 기간에 내가 남긴 worklog가 하나도 없는 것만 보여줍니다.
· 다른 달에 이미 남긴 worklog는 이 기간 판정에 포함되지 않습니다.</span>
            </button>
            <div class="row issue-filter-row">
              <label class="grow" style="margin-bottom: 0;">
                <input id="missingWorklogMonth" type="month" />
              </label>
            </div>
            <div class="row issue-filter-row">
              <div id="missingWorklogProjectFilterRow" class="row grow" style="margin-bottom: 0;">
                <div style="width: 60px; padding-top: 8px;">프로젝트: </div>
                <select id="missingWorklogProjectFilter" class="grow" style="margin-top: 0;">
                  <option value="">전체</option>
                </select>
              </div>
              <div class="actions issue-filter-actions">
                <button id="loadMissingWorklog" class="primary" type="button">조회</button>
              </div>
            </div>
            <p id="missingWorklogMsg" class="calendar-status"></p>
            <ul id="missingWorklogList" class="issue-list" aria-live="polite"></ul>
          </div>

          <div id="panel-my-issues-long-running" class="worklog-mode-panel hidden" role="tabpanel" aria-labelledby="tab-my-issues-long-running">
            <button type="button" class="tab-help">
              ⓘ 조회 조건
              <span class="tab-help-popover">현재 '진행 중' 상태인 내 담당 이슈 중, 가장 최근 '진행 중' 전환일로부터 오늘까지 마지막 상태 변경일이 기준 이상인 것만 보여줍니다.
· worklog 여부와는 무관하게 상태 체류 기간만 봅니다.</span>
            </button>
            <div class="row issue-filter-row">
              <div id="longRunningProjectFilterRow" class="row grow" style="margin-bottom: 0;">
                <div style="width: 60px; padding-top: 8px;">프로젝트: </div>
                <select id="longRunningProjectFilter" class="grow" style="margin-top: 0;">
                  <option value="">전체</option>
                </select>
              </div>
              <div class="actions issue-filter-actions">
                <button id="loadLongRunning" class="primary" type="button">조회</button>
              </div>
            </div>
            <div class="row issue-filter-row">
              <div style="width: 60px; margin-bottom: 8px; white-space: nowrap;">상태 변경일: </div>
              <input id="longRunningThreshold" type="number" min="1" value="5" class="grow" style="margin-top: 0;" />
              <div style="margin-bottom: 8px; white-space: nowrap; width: 150px; text-align: left;">일 이상</div>
            </div>
            <p id="longRunningMsg" class="calendar-status"></p>
            <ul id="longRunningList" class="issue-list" aria-live="polite"></ul>
          </div>
        </section>
      </section>

      <section
        id="panel-month-check"
        class="tab-panel hidden"
        role="tabpanel"
        aria-labelledby="tab-month-check"
      >
        <section class="card">
          <div class="row issue-filter-row">
            <label class="grow" style="margin-bottom: 0;">
              <input id="monthCheckMonth" type="month" />
            </label>
            <div class="actions issue-filter-actions">
              <button id="loadMonthCheck" class="primary" type="button">
                조회
              </button>
            </div>
          </div>
          <p id="monthCheckStatus" class="calendar-status"></p>
          <p id="monthCheckSummary" class="calendar-status month-check-month-summary"></p>
          <ul id="monthCheckList" class="issue-list" aria-live="polite"></ul>
        </section>
      </section>

      <div id="status" class="status" role="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
